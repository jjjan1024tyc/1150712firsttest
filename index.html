<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>武松打虎</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; text-align: center; background-color: #fff3e0; margin: 0; padding: 10px; display: flex; flex-direction: column; min-height: 98vh; overflow-x: hidden; }
        
        .header-container { display: flex; justify-content: center; align-items: center; gap: 20px; margin: 10px 0 20px 0; }
        h1 { color: #d84315; margin: 0; font-size: 80px; }
        .header-icon { height: 80px; object-fit: contain; }

        #topControls { background-color: #ffe0b2; padding: 10px 20px; border-radius: 10px; margin-bottom: 15px; display: inline-flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .control-label { font-weight: bold; color: #d84315; font-size: 18px; }
        
        .mode-btn { background-color: #e91e63; color: white; padding: 10px 20px; font-size: 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: all 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .mode-btn:hover { background-color: #c2185b; transform: translateY(-2px); }
        .mode-btn.active { background-color: #4caf50; cursor: default; transform: translateY(2px); box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); }
        
        #restartBtn { background-color: #607d8b; color: white; padding: 10px 20px; font-size: 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-left: 20px; }
        #restartBtn:hover { background-color: #455a64; }

        #battlefield { display: none; justify-content: center; gap: 15px; flex: 1; padding: 0 10px; flex-wrap: wrap; }

        .players-1 .player-zone { max-width: 600px; }
        .players-2 .player-zone { max-width: 48%; }
        .players-3 .player-zone { max-width: 32%; }
        .players-4 .player-zone { max-width: 24%; min-width: 250px; }

        .player-zone { 
            flex: 1; background-color: #ffcc80; border: 4px solid #8d6e63; border-radius: 15px; padding: 10px;
            display: flex; flex-direction: column; align-items: center; position: relative; box-sizing: border-box;
        }

        .player-title { font-size: 22px; font-weight: bold; color: #4e342e; margin-bottom: 5px; }
        
        .connect-area { margin-bottom: 10px; }
        .btn-connect { background-color: #ff9800; padding: 6px 12px; font-size: 15px; font-weight: bold; color: white; border: none; border-radius: 8px; cursor: pointer; transition: background 0.3s; }
        .btn-connect:hover { background-color: #e65100; }
        .btn-connect:disabled { background-color: #bdbdbd; cursor: not-allowed; }
        .status-text { display: block; font-size: 13px; margin-top: 4px; color: #d32f2f; font-weight: bold; }

        .stage { width: 100%; height: 220px; position: relative; background-color: rgba(255,255,255,0.2); border-radius: 10px; margin-bottom: 10px; overflow: visible; }

        .char-container { position: absolute; bottom: 5px; display: flex; flex-direction: column; }
        .wusong-wrap { z-index: 2; left: 50%; margin-left: -150px; align-items: flex-start; } 
        .wusong-wrap .char-name { margin-left: 35px; } 
        .tiger-wrap { z-index: 1; right: 50%; margin-right: -160px; align-items: center; }

        .char-img { height: 180px; width: auto; max-width: none; object-fit: contain; }
        .wusong-wrap .char-img { transform-origin: bottom left; object-position: bottom left; }
        .tiger-wrap .char-img { transform: scale(0.5); transform-origin: bottom center; object-position: bottom center; }

        .impact-effect { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 60px; color: red; text-shadow: 2px 2px 0 yellow, -2px -2px 0 yellow; opacity: 0; z-index: 10; pointer-events: none; }

        .score-board { font-size: 18px; font-weight: bold; color: #5d4037; margin: 5px 0; }
        .trophy-case { width: 100%; min-height: 60px; background-color: #fff; border: 2px dashed #ffb74d; border-radius: 10px; padding: 5px; display: flex; flex-wrap: wrap; gap: 3px; justify-content: center; align-items: center; align-content: flex-start; box-sizing: border-box; }
        .mini-tiger { height: 35px; object-fit: contain; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .wusong-strike { animation: strikeForward 0.2s ease-out; }
        .tiger-hit { animation: hitShake 0.3s cubic-bezier(.36,.07,.19,.97) both; filter: brightness(1.2) contrast(1.2); }
        .show-impact { animation: powEffect 0.3s ease-out; }
        .hit-flash { animation: flashBg 0.2s ease-out; }
        .win-spin { animation: spinWin 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards !important; z-index: 100 !important; }

        @keyframes flashBg { 0% { background-color: #ffcc80; } 30% { background-color: #ff5252; box-shadow: inset 0 0 50px #ffeb3b; } 100% { background-color: #ffcc80; } }
        @keyframes strikeForward { 0% { transform: translateX(0); } 50% { transform: translateX(40px); } 100% { transform: translateX(0); } }
        @keyframes hitShake { 0%, 100% { transform: scale(0.5) translate(0, 0); } 20%, 60% { transform: scale(0.5) translate(-16px, 16px) rotate(-3deg); } 40%, 80% { transform: scale(0.5) translate(16px, -16px) rotate(3deg); } }
        @keyframes powEffect { 0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); } 50% { opacity: 1; transform: translate(-50%, -50%) scale(1.5) rotate(15deg); } 100% { opacity: 0; transform: translate(-50%, -50%) scale(2); } }
        @keyframes popIn { 0% { transform: scale(0) rotate(-180deg); } 80% { transform: scale(1.2) rotate(10deg); } 100% { transform: scale(1) rotate(0deg); } }
        @keyframes spinWin { 0% { transform: scale(1) rotate(0deg); } 100% { transform: scale(1.6) rotate(360deg); filter: drop-shadow(0 0 15px #fff); } }

        footer { margin-top: 15px; padding: 10px; font-size: 14px; color: #795548; border-top: 1px solid #ffe0b2;}
    </style>
</head>
<body>

    <div class="header-container">
        <img src="ws2.png" class="header-icon" alt="武松打擊">
        <h1>武松打虎</h1>
        <img src="wstiger1.png" class="header-icon" alt="老虎">
    </div>
    
    <div id="topControls">
        <span class="control-label">選擇遊玩人數：</span>
        <button class="mode-btn" id="mode-1" onclick="setPlayerCount(1)">1人</button>
        <button class="mode-btn" id="mode-2" onclick="setPlayerCount(2)">2人</button>
        <button class="mode-btn" id="mode-3" onclick="setPlayerCount(3)">3人</button>
        <button class="mode-btn" id="mode-4" onclick="setPlayerCount(4)">4人</button>
        <button id="restartBtn" onclick="resetAll()">🔄 重新開始比賽</button>
    </div>

    <div id="battlefield">
        <!-- 玩家 1~4 區塊 -->
        <div class="player-zone" id="zone-1">
            <div class="player-title">🟢 玩家 1</div>
            <div class="connect-area"><button class="btn-connect" id="btn-conn-1" onclick="connectDevice(1)">連線 1 號棒</button><span class="status-text" id="status-1">未連線</span></div>
            <div class="stage" id="stage-1" onclick="simulateAttack(1)">
                <div class="impact-effect" id="impact-1">💥</div>
                <div class="char-container wusong-wrap" id="wusong-wrap-1"><img id="ws-img-1" class="char-img" src="ws1.png" alt="武松"><div class="char-name">武松</div></div>
                <div class="char-container tiger-wrap" id="tiger-wrap-1"><img id="tg-img-1" class="char-img" src="wstiger1.png" alt="老虎"><div class="char-name">大老虎</div></div>
            </div>
            <div class="score-board">戰績：<span id="score-1">0</span> / 10</div>
            <div class="trophy-case" id="trophy-1"></div>
        </div>
        <div class="player-zone" id="zone-2">
            <div class="player-title">🟡 玩家 2</div>
            <div class="connect-area"><button class="btn-connect" id="btn-conn-2" onclick="connectDevice(2)">連線 2 號棒</button><span class="status-text" id="status-2">未連線</span></div>
            <div class="stage" id="stage-2" onclick="simulateAttack(2)">
                <div class="impact-effect" id="impact-2">💥</div>
                <div class="char-container wusong-wrap" id="wusong-wrap-2"><img id="ws-img-2" class="char-img" src="ws1.png" alt="武松"><div class="char-name">武松</div></div>
                <div class="char-container tiger-wrap" id="tiger-wrap-2"><img id="tg-img-2" class="char-img" src="wstiger1.png" alt="老虎"><div class="char-name">大老虎</div></div>
            </div>
            <div class="score-board">戰績：<span id="score-2">0</span> / 10</div>
            <div class="trophy-case" id="trophy-2"></div>
        </div>
        <div class="player-zone" id="zone-3">
            <div class="player-title">🔴 玩家 3</div>
            <div class="connect-area"><button class="btn-connect" id="btn-conn-3" onclick="connectDevice(3)">連線 3 號棒</button><span class="status-text" id="status-3">未連線</span></div>
            <div class="stage" id="stage-3" onclick="simulateAttack(3)">
                <div class="impact-effect" id="impact-3">💥</div>
                <div class="char-container wusong-wrap" id="wusong-wrap-3"><img id="ws-img-3" class="char-img" src="ws1.png" alt="武松"><div class="char-name">武松</div></div>
                <div class="char-container tiger-wrap" id="tiger-wrap-3"><img id="tg-img-3" class="char-img" src="wstiger1.png" alt="老虎"><div class="char-name">大老虎</div></div>
            </div>
            <div class="score-board">戰績：<span id="score-3">0</span> / 10</div>
            <div class="trophy-case" id="trophy-3"></div>
        </div>
        <div class="player-zone" id="zone-4">
            <div class="player-title">🔵 玩家 4</div>
            <div class="connect-area"><button class="btn-connect" id="btn-conn-4" onclick="connectDevice(4)">連線 4 號棒</button><span class="status-text" id="status-4">未連線</span></div>
            <div class="stage" id="stage-4" onclick="simulateAttack(4)">
                <div class="impact-effect" id="impact-4">💥</div>
                <div class="char-container wusong-wrap" id="wusong-wrap-4"><img id="ws-img-4" class="char-img" src="ws1.png" alt="武松"><div class="char-name">武松</div></div>
                <div class="char-container tiger-wrap" id="tiger-wrap-4"><img id="tg-img-4" class="char-img" src="wstiger1.png" alt="老虎"><div class="char-name">大老虎</div></div>
            </div>
            <div class="score-board">戰績：<span id="score-4">0</span> / 10</div>
            <div class="trophy-case" id="trophy-4"></div>
        </div>
    </div>

    <footer id="footer">
        <div>Taoyuan City Jianguo Junior High School Teacher Chan Chih Chieh (2026)</div>
        <div id="gen-time"></div>
    </footer>

    <script>
        const UART_SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
        const TX_CHARACTERISTIC_UUID = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';
        const maxScore = 10;
        let gameEnded = false;
        let audioUnlocked = false;
        let currentPlayers = 0;

        const players = {
            1: { score: 0, device: null, server: null, buffer: "", isAttacking: false },
            2: { score: 0, device: null, server: null, buffer: "", isAttacking: false },
            3: { score: 0, device: null, server: null, buffer: "", isAttacking: false },
            4: { score: 0, device: null, server: null, buffer: "", isAttacking: false }
        };

        window.onload = () => {
            const now = new Date();
            const timeStr = now.getFullYear() + "/" + (now.getMonth()+1).toString().padStart(2,'0') + "/" + now.getDate().toString().padStart(2,'0') + " " +
                           now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0') + ":" + now.getSeconds().toString().padStart(2,'0');
            document.getElementById('gen-time').innerText = "程式產出時間：" + timeStr;
        };

        function setPlayerCount(num) {
            currentPlayers = num;
            unlockAudio();
            document.getElementById('battlefield').style.display = 'flex';

            for(let i=1; i<=4; i++) {
                const btn = document.getElementById(`mode-${i}`);
                btn.className = (i === num) ? "mode-btn active" : "mode-btn";
                document.getElementById(`zone-${i}`).style.display = (i <= num) ? 'flex' : 'none';
            }
            document.getElementById('battlefield').className = `players-${num}`;
            resetAll();
        }

        function unlockAudio() {
            if(audioUnlocked) return;
            const sounds = [1,2,3,4].map(i => document.getElementById(`snd-hit-${i}`));
            sounds.push(document.getElementById('snd-cheer'));
            sounds.forEach(s => { s.volume = 0; s.play().then(() => { s.pause(); s.currentTime = 0; s.volume = 1.0; }).catch(e => {}); });
            audioUnlocked = true;
        }

        async function connectDevice(playerId) {
            const btn = document.getElementById(`btn-conn-${playerId}`);
            const status = document.getElementById(`status-${playerId}`);
            try {
                status.innerText = "搜尋裝置...";
                const device = await navigator.bluetooth.requestDevice({ filters: [{ namePrefix: 'BBC micro:bit' }], optionalServices: [UART_SERVICE_UUID] });
                device.addEventListener('gattserverdisconnected', () => handleDisconnect(playerId));
                players[playerId].device = device;
                const server = await device.gatt.connect();
                players[playerId].server = server;
                const service = await server.getPrimaryService(UART_SERVICE_UUID);
                const char = await service.getCharacteristic(TX_CHARACTERISTIC_UUID);
                await char.startNotifications();
                char.addEventListener('characteristicvaluechanged', (e) => handleData(e, playerId));
                btn.innerText = "🟢 已連線";
                btn.disabled = true;
                status.innerText = "連線穩定";
                status.style.color = "green";
            } catch (e) {
                status.innerText = "連線失敗";
            }
        }

        function handleDisconnect(playerId) {
            const btn = document.getElementById(`btn-conn-${playerId}`);
            const status = document.getElementById(`status-${playerId}`);
            btn.innerText = `連線 ${playerId} 號棒`;
            btn.disabled = false;
            status.innerText = "已斷線";
            status.style.color = "red";
            players[playerId].device = null;
        }

        function handleData(event, playerId) {
            if (gameEnded) return;
            const decoder = new TextDecoder('utf-8');
            players[playerId].buffer += decoder.decode(event.target.value);
            if (players[playerId].buffer.includes('\n')) {
                const lines = players[playerId].buffer.split('\n');
                if (lines[lines.length - 2].trim() === "HIT") executeAttack(playerId);
                players[playerId].buffer = lines[lines.length - 1];
            }
        }

        function simulateAttack(playerId) { if(!gameEnded) executeAttack(playerId); }

        function executeAttack(playerId) {
            const p = players[playerId];
            if (p.isAttacking || gameEnded) return;
            p.isAttacking = true;
            if(audioUnlocked) { const s = document.getElementById(`snd-hit-${playerId}`); s.currentTime=0; s.play().catch(e => {}); }
            document.getElementById(`zone-${playerId}`).classList.add('hit-flash');
            document.getElementById(`impact-${playerId}`).classList.add('show-impact');
            const ws = document.getElementById(`ws-img-${playerId}`);
            const tg = document.getElementById(`tg-img-${playerId}`);
            ws.src = "ws2.png";
            tg.src = "wstiger2.png";
            document.getElementById(`wusong-wrap-${playerId}`).classList.add('wusong-strike');
            document.getElementById(`tiger-wrap-${playerId}`).classList.add('tiger-hit');
            setTimeout(() => {
                if(!gameEnded) ws.src = "ws1.png";
                document.getElementById(`zone-${playerId}`).classList.remove('hit-flash');
                document.getElementById(`impact-${playerId}`).classList.remove('show-impact');
                document.getElementById(`wusong-wrap-${playerId}`).classList.remove('wusong-strike');
                document.getElementById(`tiger-wrap-${playerId}`).classList.remove('tiger-hit');
                tg.src = "wstiger1.png";
                p.isAttacking = false;
            }, 350);
            p.score++;
            document.getElementById(`score-${playerId}`).innerText = p.score;
            const trophy = document.createElement('img');
            trophy.src = 'wstiger2.png';
            trophy.className = 'mini-tiger';
            document.getElementById(`trophy-${playerId}`).appendChild(trophy);
            if (p.score >= maxScore) declareWinner(playerId);
        }

        function declareWinner(playerId) {
            gameEnded = true;
            if(audioUnlocked) { const s = document.getElementById('snd-cheer'); s.currentTime=0; s.play().catch(e => {}); }
            document.getElementById(`wusong-wrap-${playerId}`).classList.add('win-spin');
            document.getElementById(`tiger-wrap-${playerId}`).style.display = 'none';
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }

        function resetAll() {
            gameEnded = false;
            for(let i=1; i<=4; i++) {
                players[i].score = 0;
                document.getElementById(`score-${i}`).innerText = '0';
                document.getElementById(`trophy-${i}`).innerHTML = '';
                document.getElementById(`ws-img-${i}`).src = "ws1.png";
                document.getElementById(`tg-img-${i}`).src = "wstiger1.png";
                document.getElementById(`wusong-wrap-${i}`).classList.remove('win-spin');
                document.getElementById(`tiger-wrap-${i}`).style.display = 'flex';
            }
        }
    </script>
</body>
</html>
