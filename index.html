<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>武松打虎互動小遊戲</title>
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; text-align: center; background-color: #fff3e0; margin: 0; padding: 20px; }
        h1 { color: #d84315; font-size: 36px; }
        #connectBtn { padding: 15px 30px; font-size: 20px; font-weight: bold; background-color: #ff9800; color: white; border: none; border-radius: 10px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        #connectBtn:disabled { background-color: #757575; cursor: not-allowed; }
        
        /* 遊戲主舞台 */
        #gameStage { margin: 30px auto; max-width: 800px; background-color: #ffcc80; border: 5px solid #8d6e63; border-radius: 20px; height: 300px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: space-around; }
        
        /* 角色設計 (暫時用文字與EMOJI代替，老師可以自己換成圖片) */
        .character { font-size: 80px; transition: transform 0.1s ease-in-out; }
        #wusong { position: relative; }
        /* 武松打擊時的動畫效果 */
        .hit-animation { transform: scale(1.3) rotate(-20deg); }

        /* 戰利品小老虎區域 */
        #tigerContainer { margin: 20px auto; max-width: 800px; min-height: 120px; background-color: #fff; border: 3px dashed #ffb74d; border-radius: 15px; padding: 15px; display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; }
        .mini-tiger { font-size: 50px; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* 計分板 */
        #scoreBoard { font-size: 28px; font-weight: bold; color: #5d4037; margin: 15px; }

        /* 結束大畫面 */
        #gameOverModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); color: white; justify-content: center; align-items: center; flex-direction: column; z-index: 100; }
        #gameOverModal h2 { font-size: 60px; color: #ffd54f; margin-bottom: 10px; }
        #restartBtn { padding: 12px 25px; font-size: 22px; background-color: #4caf50; color: white; border: none; border-radius: 8px; cursor: pointer; }

        @keyframes popIn {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <h1>🐯 武松打虎體感遊戲 🐯</h1>
    <button id="connectBtn">連接學生的打虎棒 (Micro:bit)</button>
    
    <div id="scoreBoard">目前打到：<span id="scoreText">0</span> / 10 隻老虎</div>

    <div id="gameStage">
        <div id="wusong" class="character">🧑‍🌾<div style="font-size:20px; text-align:center;">武松</div></div>
        <div id="targetTiger" class="character">🐯<div style="font-size:20px; text-align:center;">大老虎</div></div>
    </div>

    <h3>收服的小老虎欄位：</h3>
    <div id="tigerContainer"></div>

    <div id="gameOverModal">
        <h2>🎉 恭喜破關 🎉</h2>
        <p style="font-size: 24px;">武松成功保護了村莊！</p>
        <button id="restartBtn" onclick="resetGame()">重新挑戰</button>
    </div>

    <script>
        const UART_SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
        const TX_CHARACTERISTIC_UUID = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';
        
        let score = 0;
        let receivedBuffer = "";

        // 藍牙連線事件
        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'BBC micro:bit' }],
                    optionalServices: [UART_SERVICE_UUID]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(UART_SERVICE_UUID);
                const characteristic = await service.getCharacteristic(TX_CHARACTERISTIC_UUID);
                
                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', handleDataChanged);
                
                document.getElementById('connectBtn').innerText = "🟢 棒子已連線";
                document.getElementById('connectBtn').disabled = true;
            } catch (error) {
                console.error(error);
                alert('連線失敗，請重試！');
            }
        });

        // 處理 Micro:bit 傳來的資料
        function handleDataChanged(event) {
            const value = event.target.value;
            const decoder = new TextDecoder('utf-8');
            receivedBuffer += decoder.decode(value);

            if (receivedBuffer.includes('\n')) {
                const lines = receivedBuffer.split('\n');
                const latestData = lines[lines.length - 2].trim();
                receivedBuffer = lines[lines.length - 1];

                // 如果收到 HIT，觸發打虎邏輯
                if (latestData === "HIT") {
                    wusongAttack();
                }
            }
        }

        // 武松攻擊與計分邏輯
        function wusongAttack() {
            if (score >= 10) return; // 滿分就不再計算

            // 1. 觸發武松動態特效 (往前衝一下的視覺感)
            const wusong = document.getElementById('wusong');
            wusong.classList.add('hit-animation');
            setTimeout(() => { wusong.classList.remove('hit-animation'); }, 100);

            // 2. 加分
            score++;
            document.getElementById('scoreText').innerText = score;

            // 3. 動態增加一隻小老虎到欄位中
            const tigerContainer = document.getElementById('tigerContainer');
            const newTiger = document.createElement('div');
            newTiger.className = 'mini-tiger';
            newTiger.innerText = '🐯'; // 老師之後可以換成 <img src="小老虎.png">
            tigerContainer.appendChild(newTiger);

            // 4. 判斷是否達到 10 隻結束遊戲
            if (score === 10) {
                setTimeout(() => {
                    document.getElementById('gameOverModal').style.display = 'flex';
                }, 500); // 延遲半秒彈出，讓學生看清楚最後一隻老虎出現
            }
        }

        // 重設遊戲
        function resetGame() {
            score = 0;
            document.getElementById('scoreText').innerText = score;
            document.getElementById('tigerContainer').innerHTML = ''; // 清空小老虎
            document.getElementById('gameOverModal').style.display = 'none';
        }
    </script>
</body>
</html>
