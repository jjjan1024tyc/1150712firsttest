<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>武松打虎</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; text-align: center; background-color: #fff3e0; margin: 0; padding: 10px; display: flex; flex-direction: column; min-height: 98vh; overflow-x: hidden; }
        
        /* 標題區域設計：左邊使用 ws2.png */
        .header-container { display: flex; justify-content: center; align-items: center; gap: 20px; margin: 10px 0 20px 0; }
        h1 { color: #d84315; margin: 0; font-size: 80px; }
        .header-icon { height: 80px; object-fit: contain; }

        /* 頂部控制區與人數選擇 */
        #topControls { background-color: #ffe0b2; padding: 10px 20px; border-radius: 10px; margin-bottom: 15px; display: inline-flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .control-label { font-weight: bold; color: #d84315; font-size: 18px; }
        
        .mode-btn { background-color: #e91e63; color: white; padding: 10px 20px; font-size: 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: all 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .mode-btn:hover { background-color: #c2185b; transform: translateY(-2px); }
        .mode-btn.active { background-color: #4caf50; cursor: default; transform: translateY(2px); box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); }
        
        #restartBtn { background-color: #607d8b; color: white; padding: 10px 20px; font-size: 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-left: 20px; }
        #restartBtn:hover { background-color: #455a64; }

        /* 對戰主要容器 */
        #battlefield { display: none; justify-content: center; gap: 15px; flex: 1; padding: 0 10px; flex-wrap: wrap; align-items: flex-start; }

        /* 針對不同人數的寬度分配 */
        .players-1 .player-zone { max-width: 800px; width: 100%; }
        .players-2 .player-zone { max-width: 48%; width: 100%; }
        .players-3 .player-zone { max-width: 32%; width: 100%; }
        .players-4 .player-zone { max-width: 24%; min-width: 240px; width: 100%; }

        /* 單一玩家的區域 */
        .player-zone { 
            flex: 1; 
            background-color: #ffcc80; 
            border: 4px solid #8d6e63; 
            border-radius: 15px; 
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            box-sizing: border-box;
        }

        .player-title { font-size: 22px; font-weight: bold; color: #4e342e; margin-bottom: 5px; }
        
        /* 連線按鈕區域 */
        .connect-area { margin-bottom: 10px; }
        .btn-connect { background-color: #ff9800; padding: 6px 12px; font-size: 15px; font-weight: bold; color: white; border: none; border-radius: 8px; cursor: pointer; transition: background 0.3s; }
        .btn-connect:hover { background-color: #e65100; }
        .btn-connect:disabled { background-color: #bdbdbd; cursor: not-allowed; }
        .status-text { display: block; font-size: 13px; margin-top: 4px; color: #d32f2f; font-weight: bold; }

        /* 遊戲舞台：寬高比鎖定 16:9 */
        .stage { 
            width: 100%; 
            aspect-ratio: 16 / 9; 
            position: relative; 
            background-color: rgba(255,255,255,0.2);
            border-radius: 10px;
            margin-bottom: 10px;
            overflow: visible; 
        }

        /* 角色基礎容器 */
        .char-container { 
            position: absolute; 
            bottom: 5px; 
            display: flex; 
            flex-direction: column;
            align-items: center;
            transition: height 0.15s ease-out;
        }
        
        /* 武松未打時圖片高度為 95% */
        .wusong-wrap { 
            height: 95%;
            z-index: 2; 
            left: 25%; 
            transform: translateX(-50%);
            cursor: pointer;
        } 

        /* 武松打下時高度為 75% */
        .wusong-wrap.wusong-strike {
            height: 75%;
        }

        /* 老虎尺寸放大 20% (37.5% * 1.2 = 45%) */
        .tiger-wrap { 
            height: 45%; 
            z-index: 1; 
            right: 25%; 
            transform: translateX(50%);
        }

        /* 圖片設定 */
        .char-img { 
            height: 100%; 
            width: auto;
            max-width: none;
            object-fit: contain; 
        }

        .wusong-wrap .char-img { transform-origin: bottom center; }
        .tiger-wrap .char-img { transform-origin: bottom center; }

        /* 名字標籤 */
        .char-name {
            font-size: 14px;
            font-weight: bold;
            color: #4e342e;
            margin-top: 2px;
            white-space: nowrap;
        }

        /* 爆炸圖設定在 right: 35% 以及底部向上 30% 處 */
        .impact-effect {
             position: absolute; 
             bottom: 30%; 
             right: 35%; 
             transform: translate(50%, 0) scale(0.5);
             font-size: 6vw; 
             color: red; 
             text-shadow: 2px 2px 0 yellow, -2px -2px 0 yellow;
             opacity: 0; 
             z-index: 10; 
             pointer-events: none;
        }

        /* 在 2、3、4 人模式下，爆炸圖尺寸等比例縮小 */
        .players-1 .impact-effect { font-size: 6vw; }
        .players-2 .impact-effect { font-size: 3.8vw; }
        .players-3 .impact-effect { font-size: 2.6vw; }
        .players-4 .impact-effect { font-size: 2.0vw; }

        .score-board { font-size: 18px; font-weight: bold; color: #5d4037; margin: 5px 0; }
        .trophy-case { 
            width: 100%; min-height: 60px; background-color: #fff; border: 2px dashed #ffb74d; 
            border-radius: 10px; padding: 5px; display: flex; flex-wrap: wrap; gap: 3px; 
            justify-content: center; align-items: center; align-content: flex-start;
            box-sizing: border-box;
        }
        .mini-tiger { height: 35px; object-fit: contain; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* 動畫套用 */
        .wusong-strike { animation: strikeForward 0.2s ease-out; }
        .tiger-hit .char-img { animation: hitShake 0.3s ease-out; } 
        .show-impact { animation: powEffect 0.3s ease-out; }
        .hit-flash { animation: flashBg 0.2s ease-out; }
        
        .win-spin {
            animation: spinWin 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards !important;
            z-index: 100 !important;
        }

        @keyframes flashBg { 0% { background-color: #ffcc80; } 30% { background-color: #ff5252; box-shadow: inset 0 0 50px #ffeb3b; } 100% { background-color: #ffcc80; } }
        
        /* 武松打擊動畫 */
        @keyframes strikeForward { 
            0% { transform: translateX(-50%); } 
            50% { transform: translateX(10%); } 
            100% { transform: translateX(-50%); } 
        }
        
        /* 老虎受擊震動動畫 */
        @keyframes hitShake { 
            0%, 100% { transform: translate(0, 0); } 
            20%, 60% { transform: translate(-10px, 0) rotate(-3deg); } 
            40%, 80% { transform: translate(10px, 0) rotate(3deg); } 
        }
        
        /* 爆炸圖特效 */
        @keyframes powEffect { 
            0% { opacity: 0; transform: translate(50%, 15px) scale(0.5); } 
            50% { opacity: 1; transform: translate(50%, -15px) scale(1.4) rotate(15deg); } 
            100% { opacity: 0; transform: translate(50%, -30px) scale(1.8); } 
        }
        @keyframes popIn { 0% { transform: scale(0) rotate(-180deg); } 80% { transform: scale(1.2) rotate(10deg); } 100% { transform: scale(1) rotate(0deg); } }
        
        @keyframes spinWin { 
            0% { transform: translateX(-50%) scale(1) rotate(0deg); } 
            100% { transform: translateX(-50%) scale(1.5) rotate(360deg); filter: drop-shadow(0 0 15px #fff); } 
        }

        footer { margin-top: 20px; padding: 5px; font-size: 12px; color: #795548; border-top: 1px solid #ffe0b2;}
        .time-info { margin-top: 5px; font-size: 12px; color: #795548; font-weight: normal; }
    </style>
</head>
<body>

    <div class="header-container">
        <img src="ws2.png" class="header-icon" alt="武松打擊">
        <h1>武松打虎</h1>
        <img src="wstiger1.png" class="header-icon" alt="老虎">
    </div>
    
    <div id="topControls">
        <span class="control-label">選擇遊戲人數：</span>
        <button class="mode-btn" id="mode-1" onclick="setPlayerCount(1)">1人</button>
        <button class="mode-btn" id="mode-2" onclick="setPlayerCount(2)">2人</button>
        <button class="mode-btn" id="mode-3" onclick="setPlayerCount(3)">3人</button>
        <button class="mode-btn" id="mode-4" onclick="setPlayerCount(4)">4人</button>
        <button id="restartBtn" onclick="resetAll()">🔄 重新開始</button>
    </div>

    <div style="display:none;">
        <audio id="snd-global-hit" src="https://assets.mixkit.co/active_storage/sfx/2052/2052-preview.mp3" preload="auto"></audio>
        <audio id="snd-cheer" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3" preload="auto"></audio>
    </div>

    <div id="battlefield">
        <div class="player-zone" id="zone-1">
            <div class="player-title">🟢 玩家 1</div>
            <div class="connect-area">
                <button class="btn-connect" id="btn-conn-1" onclick="connectDevice(1)">連線 1 號棒</button>
                <span class="status-text" id="status-1">未連線</span>
            </div>
            <div class="stage" id="stage-1">
                <div class="impact-effect" id="impact-1">💥</div>
                <div class="char-container wusong-wrap" id="wusong-wrap-1" onclick="simulateAttack(1)">
                    <img id="ws-img-1" class="char-img" src="ws1.png" alt="武松">
                    <div class="char-name">武松</div>
                </div>
                <div class="char-container tiger-wrap" id="tiger-wrap-1">
                    <img id="tg-img-1" class="char-img" src="wstiger1.png" alt="老虎">
                    <div class="char-name">小老虎</div>
                </div>
            </div>
            <div class="score-board">戰績：<span id="score-1">0</span> / 10</div>
            <div class="trophy-case" id="trophy-1"></div>
        </div>

        <div class="player-zone" id="zone-2">
            <div class="player-title">🟡 玩家 2</div>
            <div class="connect-area">
                <button class="btn-connect" id="btn-conn-2" onclick="connectDevice(2)">連線 2 號棒</button>
                <span class="status-text" id="status-2">未連線</span>
            </div>
            <div class="stage" id="stage-2">
                <div class="impact-effect" id="impact-2">💥</div>
                <div class="char-container wusong-wrap" id="wusong-wrap-2" onclick="simulateAttack(2)">
                    <img id="ws-img-2" class="char-img" src="ws1.png" alt="武松">
                    <div class="char-name">武松</div>
                </div>
                <div class="char-container tiger-wrap" id="tiger-wrap-2">
                    <img id="tg-img-2" class="char-img" src="wstiger1.png" alt="老虎">
                    <div class="char-name">小老虎</div>
                </div>
            </div>
            <div class="score-board">戰績：<span id="score-2">0</span> / 10</div>
            <div class="trophy-case" id="trophy-2"></div>
        </div>

        <div class="player-zone" id="zone-3">
            <div class="player-title">🔴 玩家 3</div>
            <div class="connect-area">
                <button class="btn-connect" id="btn-conn-3" onclick="connectDevice(3)">連線 3 號棒</button>
                <span class="status-text" id="status-3">未連線</span>
            </div>
            <div class="stage" id="stage-3">
                <div class="impact-effect" id="impact-3">💥</div>
                <div class="char-container wusong-wrap" id="wusong-wrap-3" onclick="simulateAttack(3)">
                    <img id="ws-img-3" class="char-img" src="ws1.png" alt="武松">
                    <div class="char-name">武松</div>
                </div>
                <div class="char-container tiger-wrap" id="tiger-wrap-3">
                    <img id="tg-img-3" class="char-img" src="wstiger1.png" alt="老虎">
                    <div class="char-name">小老虎</div>
                </div>
            </div>
            <div class="score-board">戰績：<span id="score-3">0</span> / 10</div>
            <div class="trophy-case" id="trophy-3"></div>
        </div>

        <div class="player-zone" id="zone-4">
            <div class="player-title">🔵 玩家 4</div>
            <div class="connect-area">
                <button class="btn-connect" id="btn-conn-4" onclick="connectDevice(4)">連線 4 號棒</button>
                <span class="status-text" id="status-4">未連線</span>
            </div>
            <div class="stage" id="stage-4">
                <div class="impact-effect" id="impact-4">💥</div>
                <div class="char-container wusong-wrap" id="wusong-wrap-4" onclick="simulateAttack(4)">
                    <img id="ws-img-4" class="char-img" src="ws1.png" alt="武松">
                    <div class="char-name">武松</div>
                </div>
                <div class="char-container tiger-wrap" id="tiger-wrap-4">
                    <img id="tg-img-4" class="char-img" src="wstiger1.png" alt="老虎">
                    <div class="char-name">小老虎</div>
                </div>
            </div>
            <div class="score-board">戰績：<span id="score-4">0</span> / 10</div>
            <div class="trophy-case" id="trophy-4"></div>
        </div>
    </div>

    <footer>Taoyuan City Jianguo Junior High School Teacher Chan Chih Chieh (2026)</footer>
    <div id="timeDisplay" class="time-info"></div>

    <script>
        const UART_SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
        const TX_CHARACTERISTIC_UUID = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';

        const maxScore = 10;
        let gameEnded = false;
        let audioUnlocked = false;
        let currentPlayers = 0; 

        const players = {
            1: { score: 0, device: null, server: null, buffer: "", isAttacking: false },
            2: { score: 0, device: null, server: null, buffer: "", isAttacking: false },
            3: { score: 0, device: null, server: null, buffer: "", isAttacking: false },
            4: { score: 0, device: null, server: null, buffer: "", isAttacking: false }
        };

        window.onload = () => {
            updateGeneratedTime();
        };

        function updateGeneratedTime() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const date = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('timeDisplay').innerText = `最後修改：${year}-${month}-${date} ${hours}:${minutes}:${seconds}`;
        }

        function setPlayerCount(num, doUnlock = true) {
            currentPlayers = num;
            if(doUnlock) unlockAudio();

            const battlefield = document.getElementById('battlefield');
            battlefield.style.display = 'flex';
            battlefield.className = `players-${num}`;

            for(let i=1; i<=4; i++) {
                const btn = document.getElementById(`mode-${i}`);
                if(i === num) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
                
                const zone = document.getElementById(`zone-${i}`);
                if(i <= num) {
                    zone.style.display = 'flex';
                } else {
                    zone.style.display = 'none';
                }
            }
            resetAll(); 
        }

        function unlockAudio() {
            if(audioUnlocked) return;
            // 預先解鎖音效物件
            const snd = document.getElementById('snd-global-hit');
            snd.volume = 0;
            snd.play().then(() => { snd.pause(); snd.currentTime = 0; snd.volume = 1.0; }).catch(e => {});
            
            const cheer = document.getElementById('snd-cheer');
            cheer.volume = 0;
            cheer.play().then(() => { cheer.pause(); cheer.currentTime = 0; cheer.volume = 1.0; }).catch(e => {});
            audioUnlocked = true;
        }

        async function connectDevice(playerId) {
            const btn = document.getElementById(`btn-conn-${playerId}`);
            const status = document.getElementById(`status-${playerId}`);
            try {
                status.innerText = "搜尋裝置中..."; status.style.color = "#ff9800";
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'BBC micro:bit' }],
                    optionalServices: [UART_SERVICE_UUID]
                });
                players[playerId].device = device;
                device.addEventListener('gattserverdisconnected', () => handleDisconnect(playerId));

                status.innerText = "連線中...";
                const server = await device.gatt.connect();
                players[playerId].server = server;
                
                const service = await server.getPrimaryService(UART_SERVICE_UUID);
                const characteristic = await service.getCharacteristic(TX_CHARACTERISTIC_UUID);
                
                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', (e) => handleData(e, playerId));
                
                btn.innerText = "🟢 已連線";
                btn.disabled = true;
                status.innerText = "連線穩定";
                status.style.color = "green";
            } catch (error) {
                console.error(`玩家 ${playerId} 連線失敗`, error);
                status.innerText = "連線失敗";
                status.style.color = "red";
            }
        }

        function handleDisconnect(playerId) {
            const btn = document.getElementById(`btn-conn-${playerId}`);
            const status = document.getElementById(`status-${playerId}`);
            btn.innerText = `連線 ${playerId} 號棒`;
            btn.disabled = false;
            status.innerText = "已斷線";
            status.style.color = "red";
            players[playerId].device = null;
            players[playerId].server = null;
        }

        function handleData(event, playerId) {
            if (gameEnded || playerId > currentPlayers) return;
            const value = event.target.value;
            const decoder = new TextDecoder('utf-8');
            players[playerId].buffer += decoder.decode(value);

            if (players[playerId].buffer.includes('\n')) {
                const lines = players[playerId].buffer.split('\n');
                const latestData = lines[lines.length - 2].trim();
                players[playerId].buffer = lines[lines.length - 1];

                if (latestData === "HIT") {
                    executeAttack(playerId);
                }
            }
        }

        function simulateAttack(playerId) {
            if(!gameEnded && playerId <= currentPlayers) executeAttack(playerId);
        }

        function executeAttack(playerId) {
            const p = players[playerId];
            if (p.isAttacking || gameEnded) return;
            p.isAttacking = true;

            // ✨ 核心修正：立即播放打擊音效（利用多軌克隆克隆，100%解決第二個沒聲音與多軌重疊問題）
            if(audioUnlocked) {
                const globalSnd = document.getElementById('snd-global-hit');
                const clonedSnd = globalSnd.cloneNode(); 
                clonedSnd.volume = 1.0;
                clonedSnd.play().catch(e => console.log(e));
            }

            // ✨ 核心修正：刻意微調延後 150 毫秒（約0.15秒）再執行畫面換圖與受擊動畫，以此與音樂播放緩衝達成完美同步
            setTimeout(() => {
                const zone = document.getElementById(`zone-${playerId}`);
                zone.classList.add('hit-flash');
                document.getElementById(`impact-${playerId}`).classList.add('show-impact');

                const wsImg = document.getElementById(`ws-img-${playerId}`);
                const wsWrap = document.getElementById(`wusong-wrap-${playerId}`);
                wsImg.src = "ws2.png";
                wsWrap.classList.add('wusong-strike');

                const tgImg = document.getElementById(`tg-img-${playerId}`);
                const tgWrap = document.getElementById(`tiger-wrap-${playerId}`);
                tgImg.src = "wstiger2.png";
                tgWrap.classList.add('tiger-hit');

                const isWinningHit = (p.score + 1 >= maxScore);

                setTimeout(() => {
                    wsImg.src = "ws1.png";
                    zone.classList.remove('hit-flash');
                    document.getElementById(`impact-${playerId}`).classList.remove('show-impact');
                    wsWrap.classList.remove('wusong-strike');
                    tgWrap.classList.remove('tiger-hit');
                    
                    if (!isWinningHit) {
                        tgImg.src = "wstiger1.png";
                    }
                    
                    p.isAttacking = false;

                    if (isWinningHit && !gameEnded) {
                        declareWinner(playerId);
                    }
                }, 350);

                p.score++;
                document.getElementById(`score-${playerId}`).innerText = p.score;
                
                const trophy = document.createElement('img');
                trophy.src = 'wstiger2.png';
                trophy.className = 'mini-tiger';
                document.getElementById(`trophy-${playerId}`).appendChild(trophy);
                
            }, 150); // 150ms 的視覺延時完美校正了音效播出的硬體時間差
        }

        function declareWinner(playerId) {
            gameEnded = true;
            if(audioUnlocked) {
                const cheer = document.getElementById('snd-cheer');
                cheer.currentTime = 0;
                cheer.play().catch(e => console.log(e));
            }

            const wsWrap = document.getElementById(`wusong-wrap-${playerId}`);
            wsWrap.classList.add('win-spin');
            
            const tgImg = document.getElementById(`tg-img-${playerId}`);
            tgImg.src = "wstiger2.png";

            var duration = 3000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
              return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function() {
              var timeLeft = animationEnd - Date.now();
              if (timeLeft <= 0) return clearInterval(interval);

              var particleCount = 50 * (timeLeft / duration);
              confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
              confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }

        function resetAll() {
            gameEnded = false;
            if (currentPlayers === 0) return;

            for(let i=1; i<=4; i++) {
                players[i].score = 0;
                players[i].isAttacking = false;
                
                document.getElementById(`score-${i}`).innerText = '0';
                document.getElementById(`trophy-${i}`).innerHTML = '';
                
                const wsImg = document.getElementById(`ws-img-${i}`);
                if (wsImg) wsImg.src = "ws1.png";
                
                const tgImg = document.getElementById(`tg-img-${i}`);
                if (tgImg) tgImg.src = "wstiger1.png";
                
                const wsWrap = document.getElementById(`wusong-wrap-${i}`);
                if (wsWrap) wsWrap.classList.remove('win-spin');
                
                const tgWrap = document.getElementById(`tiger-wrap-${i}`);
                if (tgWrap) tgWrap.style.display = 'flex';
            }
        }
    </script>
</body>
