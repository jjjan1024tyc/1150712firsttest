<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Micro:bit 藍牙加速度計接收器</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding-top: 50px; background-color: #f4f4f9; }
        button { padding: 12px 24px; font-size: 18px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 5px; }
        button:hover { background-color: #0056b3; }
        .data-box { margin-top: 30px; font-size: 24px; font-weight: bold; color: #333; }
        .axis { margin: 10px; padding: 10px; display: inline-block; width: 120px; border-radius: 5px; color: white; }
        #x-val { background-color: #ff4d4d; }
        #y-val { background-color: #2ecc71; }
        #z-val { background-color: #3498db; }
    </style>
</head>
<body>

    <h1>Micro:bit 網頁藍牙即時連線</h1>
    <button id="connectBtn">連線到 Micro:bit</button>

    <div class="data-box">
        <div class="axis" id="x-val">X: --</div>
        <div class="axis" id="y-val">Y: --</div>
        <div class="axis" id="z-val">Z: --</div>
    </div>

    <script>
        // Micro:bit 官方的 藍牙 UART 服務與特徵值 UUID
        const UART_SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
        const TX_CHARACTERISTIC_UUID = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';

        let receivedBuffer = "";

        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                console.log('正在請求藍牙裝置...');
                // 1. 尋找並篩選含有 Micro:bit UART 服務的裝置
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'BBC micro:bit' }],
                    optionalServices: [UART_SERVICE_UUID]
                });

                console.log('正在連線到 GATT 伺服器...');
                const server = await device.gatt.connect();

                console.log('正在獲取 UART 服務...');
                const service = await server.getPrimaryService(UART_SERVICE_UUID);

                console.log('正在獲取 TX 特徵值...');
                const characteristic = await service.getCharacteristic(TX_CHARACTERISTIC_UUID);

                // 2. 開始監聽 Micro:bit 傳過來的資料
                await characteristic.startNotifications();
                console.log('成功啟動監聽！請搖動 Micro:bit。');
                
                document.getElementById('connectBtn').innerText = "已連線";
                document.getElementById('connectBtn').disabled = true;

                characteristic.addEventListener('characteristicvaluechanged', handleDataChanged);

            } catch (error) {
                console.error('藍牙連線失敗: ', error);
                alert('連線失敗，請確保 Micro:bit 已開機且電腦藍牙已開啟。');
            }
        });

        // 3. 處理接收到的二進位資料
        function handleDataChanged(event) {
            const value = event.target.value;
            const decoder = new TextDecoder('utf-8');
            // 將二進位轉回字串
            receivedBuffer += decoder.decode(value);

            // 檢查字串中是否有換行符號 \n (代表一筆資料傳送完畢)
            if (receivedBuffer.includes('\n')) {
                const lines = receivedBuffer.split('\n');
                // 處理最完整的那一筆資料
                const latestData = lines[lines.length - 2].trim();
                receivedBuffer = lines[lines.length - 1]; // 剩下的殘留字串留到下次處理

                if (latestData) {
                    // 解析 X,Y,Z
                    const dataArray = latestData.split(',');
                    if (dataArray.length === 3) {
                        const x = dataArray[0];
                        const y = dataArray[1];
                        const z = dataArray[2];

                        // 更新到網頁畫面上
                        document.getElementById('x-val').innerText = `X: ${x}`;
                        document.getElementById('y-val').innerText = `Y: ${y}`;
                        document.getElementById('z-val').innerText = `Z: ${z}`;
                    }
                }
            }
        }
    </script>
</body>
</html>
